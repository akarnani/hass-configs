- alias: Turn on Garage Lights
  trigger:
    platform: state
    entity_id: cover.garage_door
    to: 'open'
  condition:
    condition: or
    conditions:
      - condition: sun
        after: sunset
        after_offset: '-01:00:00'
      - condition: sun
        before: sunrise
      - condition: state
        entity_id: binary_sensor.garage_is_dark
        state: 'on'
  action:
    service: homeassistant.turn_on
    entity_id: switch.garage_lights_switch

- alias: Into Garage from Kitchen
  trigger:
    platform: state
    entity_id: binary_sensor.kitchen_door
    to: 'on'
  condition:
    condition: or
    conditions:
      - condition: sun
        after: sunset
        after_offset: '-01:00:00'
      - condition: sun
        before: sunrise
      - condition: state
        entity_id: binary_sensor.garage_is_dark
        state: 'on'
  action:
    service: homeassistant.turn_on
    entity_id: switch.garage_lights_switch

- alias: Turn off Garage Lights (Motion)
  trigger:
    platform: state
    entity_id: binary_sensor.garage_motion
    to: 'off'
    for:
      minutes: 1
  condition:
    condition: and
    conditions:
      - condition: state
        entity_id: binary_sensor.kitchen_door
        state: 'off'
      - condition: state
        entity_id: cover.garage_door
        state: 'closed'
  action:
    service: homeassistant.turn_off
    entity_id: switch.garage_lights_switch

- alias: Turn off Garage Lights (Timeout)
  trigger:
    platform: state
    entity_id: switch.garage_lights_switch
    to: 'on'
    for:
      minutes: 30
  condition:
    condition: and
    conditions:
      - condition: state
        entity_id: binary_sensor.kitchen_door
        state: 'off'
      - condition: state
        entity_id: cover.garage_door
        state: 'closed'
  action:
    service: homeassistant.turn_off
    entity_id: switch.garage_lights_switch

- alias: Notify Open Garage Door
  trigger:
    platform: state
    entity_id: cover.garage_door
    to: 'on'
    for:
      minutes: 15
  condition:
    condition: state
    entity_id: group.all_devices
    state: 'not_home'
  action:
    service: notify.slack
    data_template:
      message: "Garage door is open and no one is home"